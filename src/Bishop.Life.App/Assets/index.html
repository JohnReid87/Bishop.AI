<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #141414;
    --bg-2: #181818;
    --panel: #1d1d1d;
    --panel-2: #232323;
    --line: #2c2c2c;
    --line-2: #383838;
    --ink: #E8E8E8;
    --ink-dim: #8a8a8a;
    --ink-faint: #5f5f5f;
    --accent: #00FF41;
    --accent-dim: #0f7a2a;
    --accent-soft: rgba(0,255,65,0.10);
    --danger: #FF5555;
    --t-month: #5fa89c;   /* teal  */
    --t-year:  #c4a85f;   /* gold  */
    --t-beyond:#6b8caf;   /* blue  */
    --mono: "Cascadia Code", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --areas: #6b8caf,#c97a8a,#9aa86a,#5fa89c,#7fa87a,#7878bc,#9a7ab8,#c4a85f;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #F3F3F3;
      --bg-2: #EAEAEA;
      --panel: #FFFFFF;
      --panel-2: #F6F6F6;
      --line: #D8D8D8;
      --line-2: #C0C0C0;
      --ink: #1A1A1A;
      --ink-dim: #555555;
      --ink-faint: #8A8A8A;
      --accent: #0B7A2C;
      --accent-dim: #0B7A2C;
      --accent-soft: rgba(11,122,44,0.10);
      --danger: #C22A2A;
      --t-month: #3F7A70;
      --t-year:  #8A7430;
      --t-beyond: #4A6B8A;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* The HTML `hidden` attribute uses `display:none`, which `.cta { display:inline-flex }`
     and `.standup-banner { display:flex }` silently override (class beats attribute).
     Force `hidden` to win so the JS toggles in applyEnvelope actually take effect. */
  [hidden] { display: none !important; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--mono); font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .app { max-width: 900px; margin: 0 auto; padding: 0 18px 60px; }

  /* top bar */
  .topbar { display: flex; align-items: center; gap: 14px; padding: 16px 2px 14px; }
  .wordmark { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
  .bars { display: inline-flex; align-items: flex-end; gap: 2.5px; height: 16px; }
  .bars span { width: 3.5px; background: var(--ink); border-radius: 1px; }
  .bars span:nth-child(1){ height: 40% } .bars span:nth-child(2){ height: 68% } .bars span:nth-child(3){ height: 100% }
  .wordmark .suffix { color: var(--ink-faint); font-weight: 500; }
  .topbar .spacer { flex: 1; }
  .cta {
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    color: var(--accent); background: var(--accent-soft);
    border: 1px solid var(--accent-dim); border-radius: 8px; padding: 8px 14px;
    transition: .15s;
  }
  .cta:hover { background: rgba(0,255,65,0.16); border-color: var(--accent); }
  .cta .tri { font-size: 10px; }

  /* tabs */
  .tabs { display: flex; gap: 6px; padding: 4px 0 16px; }
  .tab {
    font-family: var(--mono); font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--ink-dim); background: none; border: 1px solid transparent;
    border-radius: 7px; padding: 7px 13px; transition: .15s; display:flex; align-items:center; gap:7px;
  }
  .tab .n { color: var(--ink-faint); font-size: 11px; }
  .tab:hover { color: var(--ink); background: var(--bg-2); }
  .tab.active { color: var(--ink); background: var(--panel-2); border-color: var(--line); }

  .view { animation: fade .3s ease both; }
  @keyframes fade { from {opacity:0} to {opacity:1} }
  .sect { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .sect-sub { font-size: 12.5px; color: var(--ink-dim); margin-bottom: 15px; }
  .sect + .sect, .block + .sect { margin-top: 28px; }
  .empty { border: 1px dashed var(--line); border-radius: 10px; padding: 20px; color: var(--ink-faint); font-size: 13px; text-align: center; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 9px; transition: border-color .15s; }
  .card:hover { border-color: var(--line-2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; display:inline-block; }
  .lineage { font-size: 11px; color: var(--ink-faint); }
  .lineage b { color: var(--ink-dim); font-weight: 500; }
  .pill { font-size: 10px; font-weight: 600; letter-spacing:.3px; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; }
  .pill.month  { color: var(--t-month);  background: rgba(95,168,156,.13); }
  .pill.year   { color: var(--t-year);   background: rgba(196,168,95,.13); }
  .pill.beyond { color: var(--t-beyond); background: rgba(107,140,175,.13); }
  .progress { font-size: 11px; color: var(--ink-faint); }

  .act { display:flex; align-items:center; gap:10px; padding:7px 0; }
  .act + .act { border-top: 1px solid rgba(255,255,255,.03); }
  .check { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--ink-faint); flex:none; display:grid; place-items:center; transition:.15s; }
  .check.on { background: var(--accent); border-color: var(--accent); }
  .check.on::after { content:"\2713"; color:#0a160c; font-size:11px; font-weight:800; }
  .act-text { flex:1; font-size:13.5px; }
  .act.done .act-text { color: var(--ink-faint); text-decoration: line-through; }
  .star { background:none; border:none; font-size:14px; color:var(--ink-faint); transition:.15s; line-height:1; }
  .star.on { color: var(--t-year); }

  /* action-level horizon pill (mirrors .pill, but interactive — click cycles) */
  .h-pill { font-size: 10px; font-weight: 600; letter-spacing:.3px; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; cursor: pointer; user-select: none; transition: .15s; flex:none; }
  .h-pill.today    { color: var(--accent);   background: var(--accent-soft); }
  .h-pill.thisWeek { color: var(--t-month);  background: rgba(95,168,156,.13); }
  .h-pill.thisMonth{ color: var(--t-year);   background: rgba(196,168,95,.13); }
  .h-pill.someday  { color: var(--t-beyond); background: rgba(107,140,175,.13); }
  .h-pill:hover    { filter: brightness(1.15); }

  /* per-horizon section header inside an area */
  .h-sect { font-size:11px; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-dim); margin:10px 0 4px 3px; padding-left:13px; border-left:1px solid var(--line); }
  .h-sect.today { color: var(--accent); }

  .area-block { margin-bottom: 22px; }
  .area-head { display:flex; align-items:center; gap:9px; margin-bottom:9px; }
  .area-name { font-weight:600; font-size:14.5px; flex:1; }
  .area-meta { font-size:11px; color:var(--ink-faint); }
  .goal-block { margin:0 0 8px 3px; padding-left:13px; border-left:1px solid var(--line); }
  .goal-head { display:flex; align-items:center; gap:8px; padding:4px 0; }
  .goal-title { font-size:13.5px; font-weight:500; flex:1; }

  .lanes { display:grid; grid-template-columns:1fr; gap:16px; }
  @media (min-width:720px){ .lanes { grid-template-columns:repeat(3,1fr); } }
  .lane-title { font-size:11px; letter-spacing:.8px; text-transform:uppercase; margin-bottom:9px; color:var(--ink-dim); }
  .lane.month .lane-title{ color:var(--t-month) } .lane.year .lane-title{ color:var(--t-year) } .lane.beyond .lane-title{ color:var(--t-beyond) }
  .mini { background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:10px 12px; margin-bottom:8px; }
  .mini .t { font-size:13px; font-weight:500; }
  .mini .m { display:flex; align-items:center; gap:7px; margin-top:6px; }

  .bal-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); }
  .bal-name { width:160px; display:flex; align-items:center; gap:9px; font-size:13.5px; flex:none; }
  .bar-track { flex:1; height:9px; background:var(--bg-2); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; transition:width .5s cubic-bezier(.2,.8,.2,1); }
  .bal-count { font-size:11px; color:var(--ink-dim); width:96px; text-align:right; flex:none; }
  .untended { color: var(--t-year); }

  /* stand-up in-flight banner */
  .standup-banner { background:rgba(196,168,95,.10); border:1px solid rgba(196,168,95,.45); color:var(--t-year); border-radius:9px; padding:9px 13px; margin:0 0 14px; font-size:12.5px; display:flex; align-items:center; gap:9px; }
  .standup-banner::before { content:""; width:8px; height:8px; border-radius:50%; background:var(--t-year); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
  .standup-disabled .check, .standup-disabled .star { cursor: not-allowed; opacity: .55; }
  .standup-disabled .act-text[contenteditable="true"] { background: transparent; }
  .act-text[contenteditable="true"] { outline: none; border-radius: 3px; padding: 1px 3px; margin: -1px -3px; cursor: text; }
  .act-text[contenteditable="true"]:hover { background: rgba(255,255,255,.04); }
  .act-text[contenteditable="true"]:focus { background: var(--bg-2); box-shadow: 0 0 0 1px var(--line-2); }
  .check, .star { cursor: pointer; }

  /* today banner */
  .today { background:var(--accent-soft); border:1px solid var(--accent-dim); border-radius:10px; padding:13px 15px; margin-bottom:18px; }
  .today h4 { font-size:11px; letter-spacing:.6px; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
  .today .refl { font-size:13px; color:var(--ink); margin-bottom:9px; }
  .today ul { list-style:none; display:flex; flex-direction:column; gap:5px; }
  .today li { font-size:13px; display:flex; gap:8px; }
  .today li::before { content:"\203A"; color:var(--accent); }

  /* footer */
  .foot { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line); margin-top:32px; padding-top:13px; }
  .saved { font-size:11px; color:var(--ink-faint); }
  .review { font-size:11px; color:var(--ink-faint); }
  .review b { color:var(--ink-dim); font-weight:500; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="wordmark"><span class="bars"><span></span><span></span><span></span></span>bishop<span class="suffix">.life</span></div>
    <div class="spacer"></div>
    <button class="cta" id="initBtn" hidden><span class="tri">&#9655;</span> Initialize Life</button>
    <button class="cta" id="standupBtn" disabled><span class="tri">&#9655;</span> Initiate Stand-Up</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-view="focus">Focus<span class="n" id="nFocus"></span></button>
    <button class="tab" data-view="map">Map</button>
    <button class="tab" data-view="horizons">Horizons</button>
    <button class="tab" data-view="balance">Balance</button>
  </div>

  <div id="standupBanner" class="standup-banner" hidden>Stand-up in progress &mdash; inline edits paused.</div>
  <div id="container"></div>

  <div class="foot">
    <span class="review" id="filePath"></span>
    <span class="saved" id="saved">waiting&hellip;</span>
  </div>
</div>

<script>
/* Receives state from the .NET host via window.chrome.webview. Inline
   mutations (star, check, title) build the new whole-file plan in-place,
   then postMessage it back as {type:"mutate", plan:…}; the host atomically
   saves and re-posts on file change. While a stand-up is in flight, the
   host sets standupInFlight=true and mutations are disabled. */

const HORIZONS = { month:"This month", year:"This year", beyond:"Beyond" };
// Action-level horizon enum (matches Bishop.Life.Core.Schema.Horizon serialized
// via JsonStringEnumConverter w/ camelCase). Order is the cycle order on click.
const ACTION_HORIZONS = { today:"Today", thisWeek:"This week", thisMonth:"This month", someday:"Someday" };
const ACTION_HORIZON_KEYS = Object.keys(ACTION_HORIZONS);
const DEFAULT_ACTION_HORIZON = "thisWeek";

let plan = null;       // nested LifePlan from Bishop.Life.Core
let status = "waiting";
let filePath = "";
let currentView = "focus";
let standupInFlight = false;
let titleDebounce = null;
let titleDebounceTarget = null; // {id, el} of the contenteditable awaiting flush

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function bucket(horizon) {
  if (!horizon) return "beyond";
  const parts = String(horizon).split("-");
  const y = Number(parts[0]), m = Number(parts[1]);
  if (!y || !m) return "beyond";
  const now = new Date();
  const diff = (y - now.getFullYear()) * 12 + (m - (now.getMonth() + 1));
  if (diff <= 3) return "month";
  if (y === now.getFullYear()) return "year";
  return "beyond";
}

function allGoals() {
  if (!plan) return [];
  return (plan.areas || []).flatMap(a => (a.goals || []).map(g => ({ goal: g, area: a })));
}

function allActions() {
  if (!plan) return [];
  return (plan.areas || []).flatMap(a => (a.goals || []).flatMap(g => (g.actions || []).map(act => ({ action: act, goal: g, area: a }))));
}

function setSaved(text) { document.getElementById("saved").textContent = text; }
function setFilePath(p) { document.getElementById("filePath").textContent = p || ""; }

function findAction(id) {
  if (!plan || !id) return null;
  for (const a of plan.areas || [])
    for (const g of a.goals || [])
      for (const act of g.actions || [])
        if (act.id === id) return act;
  return null;
}

function postMutation() {
  if (!window.chrome || !window.chrome.webview) return;
  window.chrome.webview.postMessage(JSON.stringify({ type: "mutate", plan }));
  setSaved("saving…");
}

function flushPendingTitleEdit() {
  if (!titleDebounceTarget) return;
  clearTimeout(titleDebounce);
  const { id, el } = titleDebounceTarget;
  titleDebounce = null;
  titleDebounceTarget = null;
  commitTitle(id, el.textContent);
}

function commitTitle(id, value) {
  const a = findAction(id); if (!a) return;
  const trimmed = (value || "").replace(/\s+/g, " ").trim();
  if (!trimmed || trimmed === a.title) return;
  a.title = trimmed;
  postMutation();
}

function attr(id) { return `data-action-id="${esc(id)}"`; }

function render() {
  const focusCount = allActions().filter(x => x.action.starred && !x.action.done).length;
  document.getElementById("nFocus").textContent = focusCount || "";

  const c = document.getElementById("container");
  if (status === "missing") {
    c.innerHTML = `<div class="empty" style="margin-top:24px">No bishop.life file at <b>${esc(filePath)}</b>. Click <b>Initialize Life</b> above to seed it.</div>`;
    return;
  }
  if (status === "error") {
    c.innerHTML = `<div class="empty" style="margin-top:24px;color:var(--danger)">Couldn't read <b>${esc(filePath)}</b>.</div>`;
    return;
  }
  if (!plan) {
    c.innerHTML = `<div class="empty" style="margin-top:24px">Waiting for state from host&hellip;</div>`;
    return;
  }

  const renderers = { focus: focusView, map: mapView, horizons: horizonsView, balance: balanceView };
  c.innerHTML = renderers[currentView]();
}

function focusView() {
  let h = '<div class="view">';
  const lastStandup = (plan.standups || []).slice(-1)[0];
  if (lastStandup) {
    const focusIds = new Set(lastStandup.focusToday || []);
    const focusTitles = allActions().filter(x => focusIds.has(x.action.id)).map(x => x.action.title);
    h += `<div class="today"><h4>Today &middot; from latest stand-up</h4>
      <div class="refl">${esc(lastStandup.reflection || "")}</div>
      ${focusTitles.length ? `<ul>${focusTitles.map(t => `<li>${esc(t)}</li>`).join("")}</ul>` : ""}
    </div>`;
  }

  const starred = allActions().filter(x => x.action.starred && !x.action.done);
  h += `<div class="sect">What matters now</div><div class="sect-sub">Starred actions, each tied to the goal it serves.</div>`;
  if (!starred.length) {
    h += `<div class="empty">Nothing starred. Run a stand-up to set today's focus.</div>`;
  } else {
    h += starred.map(({ action, goal, area }) => `
      <div class="card" style="display:flex;align-items:center;gap:11px" ${attr(action.id)}>
        <div class="check ${action.done ? "on" : ""}"></div>
        <div style="flex:1">
          <div class="act-text" style="font-size:13.5px" contenteditable="true" spellcheck="false">${esc(action.title)}</div>
          <div class="lineage" style="margin-top:3px"><span class="dot" style="background:${esc(area.color)}"></span> <b>${esc(area.name)}</b> &#9656; ${esc(goal.name)}</div>
        </div>
        <span class="star on">&#9733;</span>
      </div>`).join("");
  }

  const monthGoals = allGoals().filter(x => bucket(x.goal.horizon) === "month");
  h += `<div class="sect">This month's targets</div><div class="sect-sub">Goals on the nearest horizon.</div>`;
  if (!monthGoals.length) {
    h += `<div class="empty">No goals on the month horizon.</div>`;
  } else {
    h += monthGoals.map(goalMini).join("");
  }
  return h + "</div>";
}

function goalMini({ goal, area }) {
  const acts = goal.actions || [];
  const done = acts.filter(a => a.done).length;
  return `<div class="card" style="display:flex;align-items:center;gap:10px">
    <span class="dot" style="background:${esc(area.color)}"></span>
    <div style="flex:1">
      <div style="font-weight:500;font-size:13.5px">${esc(goal.name)}</div>
      <div class="lineage" style="margin-top:2px">${esc(area.name)}</div>
    </div>
    <span class="progress">${done}/${acts.length}</span>
  </div>`;
}

function actionHorizonKey(a) {
  return ACTION_HORIZONS[a.horizon] ? a.horizon : DEFAULT_ACTION_HORIZON;
}

function mapView() {
  let h = `<div class="view"><div class="sect">The map</div><div class="sect-sub">Actions grouped by horizon within each life area. The urgency at a glance.</div>`;
  h += (plan.areas || []).map(area => {
    const goals = area.goals || [];
    const flat = goals.flatMap(g => (g.actions || []).map(a => ({ a, goal: g })));
    const openCount = flat.filter(x => !x.a.done).length;
    let block = `<div class="area-block"><div class="area-head">
      <span class="dot" style="background:${esc(area.color)}"></span>
      <span class="area-name">${esc(area.name)}</span>
      <span class="area-meta">${goals.length} goal${goals.length !== 1 ? "s" : ""} &middot; ${openCount} open</span>
    </div>`;

    // Group actions by horizon section; empty sections collapse (not rendered).
    // Within a section, starred sorts above unstarred so a starred Today action leads its bucket.
    for (const hkey of ACTION_HORIZON_KEYS) {
      const items = flat.filter(x => actionHorizonKey(x.a) === hkey);
      if (!items.length) continue;
      items.sort((x, y) => Number(!!y.a.starred) - Number(!!x.a.starred));
      block += `<div class="h-sect ${hkey}">${ACTION_HORIZONS[hkey]} &middot; ${items.length}</div>`;
      block += items.map(({ a, goal }) => {
        const hk = actionHorizonKey(a);
        return `<div class="act ${a.done ? "done" : ""}" ${attr(a.id)}>
          <div class="check ${a.done ? "on" : ""}"></div>
          <div style="flex:1">
            <span class="act-text" contenteditable="true" spellcheck="false">${esc(a.title)}</span>
            <div class="lineage" style="margin-top:2px">${esc(goal.name)}</div>
          </div>
          <span class="h-pill ${hk}" title="Click to cycle horizon">${ACTION_HORIZONS[hk]}</span>
          <span class="star ${a.starred ? "on" : ""}">${a.starred ? "&#9733;" : "&#9734;"}</span>
        </div>`;
      }).join("");
    }
    if (!flat.length) {
      block += `<div class="empty" style="padding:12px;font-size:12px">No actions in this area.</div>`;
    }
    return block + "</div>";
  }).join("");
  return h + "</div>";
}

function horizonsView() {
  let h = `<div class="view"><div class="sect">Horizons</div><div class="sect-sub">The same goals, sorted by how far out they sit.</div><div class="lanes">`;
  for (const [k, label] of Object.entries(HORIZONS)) {
    const items = allGoals().filter(x => bucket(x.goal.horizon) === k);
    h += `<div class="lane ${k}"><div class="lane-title">${label} &middot; ${items.length}</div>`;
    h += items.length
      ? items.map(({ goal, area }) => {
          const acts = goal.actions || [];
          const done = acts.filter(a => a.done).length;
          return `<div class="mini"><div class="t">${esc(goal.name)}</div>
            <div class="m"><span class="dot" style="background:${esc(area.color)}"></span>
              <span class="lineage">${esc(area.name)}</span>
              <span class="progress" style="margin-left:auto">${done}/${acts.length}</span>
            </div></div>`;
        }).join("")
      : `<div class="empty" style="padding:13px;font-size:12px">empty</div>`;
    h += "</div>";
  }
  return h + "</div></div>";
}

function balanceView() {
  const rows = (plan.areas || []).map(area => {
    const goals = area.goals || [];
    const open = goals.reduce((n, g) => n + (g.actions || []).filter(a => !a.done).length, 0);
    return { area, goalCount: goals.length, open };
  });
  const max = Math.max(1, ...rows.map(r => r.open));
  let h = `<div class="view"><div class="sect">Balance</div><div class="sect-sub">Open actions per area. Not a leaderboard &mdash; a way to notice what's gone quiet.</div>`;
  h += rows.map(r => `<div class="bal-row">
    <div class="bal-name"><span class="dot" style="background:${esc(r.area.color)}"></span>${esc(r.area.name)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${(r.open / max * 100) || 2}%;background:${esc(r.area.color)}"></div></div>
    <div class="bal-count">${r.goalCount ? `${r.goalCount}g &middot; ${r.open} open` : `<span class="untended">untended</span>`}</div>
  </div>`).join("");
  return h + "</div>";
}

document.querySelector(".tabs").addEventListener("click", e => {
  const tab = e.target.closest(".tab"); if (!tab) return;
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  tab.classList.add("active");
  currentView = tab.dataset.view;
  render();
});

function applyEnvelope(env) {
  status = env.status || "ok";
  filePath = env.filePath || "";
  plan = env.plan || null;
  standupInFlight = !!env.standupInFlight;
  setFilePath(filePath);
  setSaved(status === "ok" ? "loaded · " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : status);
  // Stand-up runs even when no file exists yet (it can seed one), so enable
  // the button on any envelope from the host rather than gating on plan data.
  document.getElementById("standupBtn").disabled = standupInFlight;
  document.getElementById("initBtn").hidden = status !== "missing" || standupInFlight;
  document.getElementById("standupBanner").hidden = !standupInFlight;
  document.body.classList.toggle("standup-disabled", standupInFlight);
  // Drop any pending edit — its target node is about to be replaced by render().
  titleDebounce = null;
  titleDebounceTarget = null;
  render();
}

const container = document.getElementById("container");

container.addEventListener("click", e => {
  const host = e.target.closest("[data-action-id]");
  if (!host) return;
  if (standupInFlight) return;
  const id = host.dataset.actionId;
  const action = findAction(id); if (!action) return;

  if (e.target.closest(".check")) {
    flushPendingTitleEdit();
    action.done = !action.done;
    action.completedAt = action.done ? new Date().toISOString() : null;
    postMutation();
    render();
  } else if (e.target.closest(".star")) {
    flushPendingTitleEdit();
    action.starred = !action.starred;
    postMutation();
    render();
  } else if (e.target.closest(".h-pill")) {
    flushPendingTitleEdit();
    const cur = ACTION_HORIZONS[action.horizon] ? action.horizon : DEFAULT_ACTION_HORIZON;
    const idx = ACTION_HORIZON_KEYS.indexOf(cur);
    action.horizon = ACTION_HORIZON_KEYS[(idx + 1) % ACTION_HORIZON_KEYS.length];
    postMutation();
    render();
  }
});

container.addEventListener("input", e => {
  const text = e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  const host = text.closest("[data-action-id]");
  if (!host) return;
  if (standupInFlight) { text.textContent = findAction(host.dataset.actionId)?.title || ""; return; }
  clearTimeout(titleDebounce);
  titleDebounceTarget = { id: host.dataset.actionId, el: text };
  titleDebounce = setTimeout(flushPendingTitleEdit, 500);
});

container.addEventListener("blur", e => {
  const text = e.target.closest && e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  flushPendingTitleEdit();
}, true);

container.addEventListener("keydown", e => {
  const text = e.target.closest && e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  if (e.key === "Enter") { e.preventDefault(); text.blur(); }
  else if (e.key === "Escape") {
    const host = text.closest("[data-action-id]");
    const action = host && findAction(host.dataset.actionId);
    if (action) { text.textContent = action.title; }
    clearTimeout(titleDebounce); titleDebounce = null; titleDebounceTarget = null;
    text.blur();
  }
});

if (window.chrome && window.chrome.webview) {
  window.chrome.webview.addEventListener("message", evt => {
    const env = typeof evt.data === "string" ? JSON.parse(evt.data) : evt.data;
    applyEnvelope(env);
  });
}

document.getElementById("standupBtn").addEventListener("click", () => {
  if (standupInFlight) return;
  flushPendingTitleEdit();
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage("standup");
  }
});

document.getElementById("initBtn").addEventListener("click", () => {
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage("init");
  }
});

render();
</script>
</body>
</html>
