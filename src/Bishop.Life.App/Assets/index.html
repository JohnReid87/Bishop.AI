<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;500;600;700&display=swap" rel="stylesheet" />
<!-- xterm.js bundled locally under Assets/xterm/ (card #1053). Retained as
     dormant fallback; the live stand-up renders from the on-disk session
     JSONL via #standupTranscript instead (card #1059). -->
<link rel="stylesheet" href="xterm/xterm.css" />

<style>
  :root {
    --bg: #141414;
    --bg-2: #181818;
    --panel: #1d1d1d;
    --panel-2: #232323;
    --line: #2c2c2c;
    --line-2: #383838;
    --ink: #E8E8E8;
    --ink-dim: #8a8a8a;
    --ink-faint: #5f5f5f;
    --accent: #00FF41;
    --accent-dim: #0f7a2a;
    --accent-soft: rgba(0,255,65,0.10);
    --danger: #FF5555;
    --t-month: #5fa89c;   /* teal  */
    --t-year:  #c4a85f;   /* gold  */
    --t-beyond:#6b8caf;   /* blue  */
    --mono: "Cascadia Code", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --areas: #6b8caf,#c97a8a,#9aa86a,#5fa89c,#7fa87a,#7878bc,#9a7ab8,#c4a85f;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #F3F3F3;
      --bg-2: #EAEAEA;
      --panel: #FFFFFF;
      --panel-2: #F6F6F6;
      --line: #D8D8D8;
      --line-2: #C0C0C0;
      --ink: #1A1A1A;
      --ink-dim: #555555;
      --ink-faint: #8A8A8A;
      --accent: #0B7A2C;
      --accent-dim: #0B7A2C;
      --accent-soft: rgba(11,122,44,0.10);
      --danger: #C22A2A;
      --t-month: #3F7A70;
      --t-year:  #8A7430;
      --t-beyond: #4A6B8A;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* The HTML `hidden` attribute uses `display:none`, which `.cta { display:inline-flex }`
     and `.standup-banner { display:flex }` silently override (class beats attribute).
     Force `hidden` to win so the JS toggles in applyEnvelope actually take effect. */
  [hidden] { display: none !important; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--mono); font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .app { max-width: 900px; margin: 0 auto; padding: 0 18px 60px; }

  /* top bar */
  .topbar { display: flex; align-items: center; gap: 14px; padding: 16px 2px 14px; }
  .cta {
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    color: var(--accent); background: var(--accent-soft);
    border: 1px solid var(--accent-dim); border-radius: 8px; padding: 8px 14px;
    transition: .15s;
  }
  .cta:hover { background: rgba(0,255,65,0.16); border-color: var(--accent); }
  .cta .tri { font-size: 10px; }
  /* Secondary CTA: lower visual weight than the primary stand-up CTA — muted
     ink colours instead of the accent green, so the daily ritual remains the
     visual focus while quick capture stays one click away. */
  .cta.secondary { color: var(--ink-dim); background: transparent; border-color: var(--line); }
  .cta.secondary:hover { background: rgba(255,255,255,0.04); border-color: var(--ink-dim); color: var(--ink); }
  .cta.secondary .plus { font-size: 14px; line-height: 1; }

  /* tabs */
  .tabs { display: flex; gap: 6px; padding: 4px 0 16px; }
  .tab {
    font-family: var(--mono); font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--ink-dim); background: none; border: 1px solid transparent;
    border-radius: 7px; padding: 7px 13px; transition: .15s; display:flex; align-items:center; gap:7px;
  }
  .tab .n { color: var(--ink-faint); font-size: 11px; }
  .tab:hover { color: var(--ink); background: var(--bg-2); }
  .tab.active { color: var(--ink); background: var(--panel-2); border-color: var(--line); }

  .view { animation: fade .3s ease both; }
  @keyframes fade { from {opacity:0} to {opacity:1} }
  .sect { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .sect-sub { font-size: 12.5px; color: var(--ink-dim); margin-bottom: 15px; }
  .sect + .sect, .block + .sect { margin-top: 28px; }
  .empty { border: 1px dashed var(--line); border-radius: 10px; padding: 20px; color: var(--ink-faint); font-size: 13px; text-align: center; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 9px; transition: border-color .15s; }
  .card:hover { border-color: var(--line-2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; display:inline-block; }
  .lineage { font-size: 11px; color: var(--ink-faint); }
  .lineage b { color: var(--ink-dim); font-weight: 500; }
  .pill { font-size: 10px; font-weight: 600; letter-spacing:.3px; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; }
  .pill.month  { color: var(--t-month);  background: rgba(95,168,156,.13); }
  .pill.year   { color: var(--t-year);   background: rgba(196,168,95,.13); }
  .pill.beyond { color: var(--t-beyond); background: rgba(107,140,175,.13); }
  .progress { font-size: 11px; color: var(--ink-faint); }

  .act { display:flex; align-items:center; gap:10px; padding:7px 0; }
  .act + .act { border-top: 1px solid rgba(255,255,255,.03); }
  .check { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--ink-faint); flex:none; display:grid; place-items:center; transition:.15s; }
  .check.on { background: var(--accent); border-color: var(--accent); }
  .check.on::after { content:"\2713"; color:#0a160c; font-size:11px; font-weight:800; }
  .act-text { flex:1; font-size:13.5px; }
  .act.done .act-text { color: var(--ink-faint); text-decoration: line-through; }
  .star { background:none; border:none; font-size:14px; color:var(--ink-faint); transition:.15s; line-height:1; }
  .star.on { color: var(--t-year); }

  /* action-level horizon pill (mirrors .pill, but interactive — click cycles) */
  .h-pill { font-size: 10px; font-weight: 600; letter-spacing:.3px; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; cursor: pointer; user-select: none; transition: .15s; flex:none; }
  .h-pill.today    { color: var(--accent);   background: var(--accent-soft); }
  .h-pill.thisWeek { color: var(--t-month);  background: rgba(95,168,156,.13); }
  .h-pill.thisMonth{ color: var(--t-year);   background: rgba(196,168,95,.13); }
  .h-pill.someday  { color: var(--t-beyond); background: rgba(107,140,175,.13); }
  .h-pill:hover    { filter: brightness(1.15); }

  /* goal-level horizon pill (YYYY-MM). Click swaps to an inline month input. */
  .g-pill { font-size: 10px; font-weight: 600; letter-spacing:.3px; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; cursor: pointer; user-select: none; transition: .15s; flex:none; }
  .g-pill.month  { color: var(--t-month);  background: rgba(95,168,156,.13); }
  .g-pill.year   { color: var(--t-year);   background: rgba(196,168,95,.13); }
  .g-pill.beyond { color: var(--t-beyond); background: rgba(107,140,175,.13); }
  .g-pill.empty  { color: var(--ink-faint); background: var(--bg-2); border:1px dashed var(--line-2); }
  .g-pill:hover  { filter: brightness(1.15); }
  .g-pill-edit   { font-family: var(--mono); font-size: 11px; padding: 1px 4px; border-radius: 4px; border: 1px solid var(--line-2); background: var(--bg-2); color: var(--ink); outline: none; }
  .standup-disabled .g-pill { cursor: not-allowed; opacity: .55; }

  /* per-horizon section header inside an area */
  .h-sect { font-size:11px; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-dim); margin:10px 0 4px 3px; padding-left:13px; border-left:1px solid var(--line); }
  .h-sect.today { color: var(--accent); }

  /* Map-tab area block: per-area coloured left border + tinted heading row
     so areas are visually distinct at a glance. Per-horizon section styling
     inside the block stays neutral (see card #1029). The border-left colour
     and area-head background are set inline from `area.color`. */
  .area-block { margin-bottom: 22px; border-left: 4px solid transparent; padding-left: 11px; }
  .area-head { display:flex; align-items:center; gap:9px; margin-bottom:9px; padding: 6px 9px; border-radius: 6px; }
  .area-name { font-weight:600; font-size:14.5px; flex:1; }
  .area-meta { font-size:11px; color:var(--ink-faint); }
  .goal-block { margin:0 0 8px 3px; padding-left:13px; border-left:1px solid var(--line); }
  .goal-head { display:flex; align-items:center; gap:8px; padding:4px 0; }
  .goal-title { font-size:13.5px; font-weight:500; flex:1; }

  .lanes { display:grid; grid-template-columns:1fr; gap:16px; }
  @media (min-width:720px){ .lanes { grid-template-columns:repeat(3,1fr); } }
  .lane-title { font-size:11px; letter-spacing:.8px; text-transform:uppercase; margin-bottom:9px; color:var(--ink-dim); }
  .lane.month .lane-title{ color:var(--t-month) } .lane.year .lane-title{ color:var(--t-year) } .lane.beyond .lane-title{ color:var(--t-beyond) }
  .mini { background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:10px 12px; margin-bottom:8px; }
  .mini .t { font-size:13px; font-weight:500; }
  .mini .m { display:flex; align-items:center; gap:7px; margin-top:6px; }

  .bal-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); }
  .bal-name { width:160px; display:flex; align-items:center; gap:9px; font-size:13.5px; flex:none; }
  .bar-track { flex:1; height:9px; background:var(--bg-2); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; transition:width .5s cubic-bezier(.2,.8,.2,1); }
  .bal-count { font-size:11px; color:var(--ink-dim); width:96px; text-align:right; flex:none; }
  .untended { color: var(--t-year); }

  /* speak viz panel — animates while Bishop.Cli's Piper TTS plays via the
     bishop-life-speak named pipe. Renders a CRT-phosphor oscilloscope
     trace of the raw PCM waveform: the centre column maps to the 150 ms
     look-ahead boundary and the edges map to current playback time, so
     peaks emerge at centre and flow outward. The left half is a
     horizontal mirror of the right so the trace stays symmetric about
     the vertical centre line. */
  .viz-panel { display:flex; align-items:center; gap:10px; height:64px; padding:0 12px;
    background:var(--panel); border:1px solid var(--line); border-radius:9px;
    margin:0 0 14px; }
  .viz-panel canvas { flex:1; height:48px; display:block; }

  /* Embedded stand-up transcript (card #1059). Replaces the raw xterm.js
     view (card #1053) with an HTML chat transcript rendered from the on-disk
     session JSONL. The .standup-terminal class is kept as the shell because
     the viewport-fixed-height contract (card #1058) and palette match what
     this card needs anyway. */
  .standup-terminal { background:var(--bg); border:1px solid var(--line);
    border-radius:9px; padding:12px 14px; margin:0 0 14px;
    height:60vh; overflow-y:auto;
    scrollbar-gutter: stable; }
  .standup-terminal::-webkit-scrollbar { width: 8px; }
  .standup-terminal::-webkit-scrollbar-track { background: transparent; }
  .standup-terminal::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .standup-terminal::-webkit-scrollbar-thumb:hover { background: var(--line-2); }
  .standup-terminal::-webkit-scrollbar-thumb:active { background: var(--ink-faint); }

  /* Transcript entries */
  .tx-entry { margin: 0 0 12px; }
  .tx-entry:last-child { margin-bottom: 0; }
  .tx-user {
    background: var(--accent-soft); border: 1px solid var(--accent-dim);
    border-radius: 8px; padding: 8px 12px;
    color: var(--ink); white-space: pre-wrap; word-wrap: break-word;
    margin-left: 32px;
  }
  .tx-assistant {
    color: var(--ink); padding: 2px 0;
    line-height: 1.55;
  }
  .tx-assistant p { margin: 0 0 8px; }
  .tx-assistant p:last-child { margin-bottom: 0; }
  .tx-assistant h1, .tx-assistant h2, .tx-assistant h3 {
    font-size: 13.5px; font-weight: 600; margin: 12px 0 4px; color: var(--ink);
  }
  .tx-assistant ul, .tx-assistant ol { margin: 4px 0 8px 20px; }
  .tx-assistant li { margin: 2px 0; }
  .tx-assistant code {
    background: var(--bg-2); padding: 1px 5px; border-radius: 3px;
    font-size: 12.5px; color: var(--ink);
  }
  .tx-assistant pre {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 11px; margin: 6px 0 10px;
    overflow-x: auto; font-size: 12.5px; line-height: 1.45;
  }
  .tx-assistant pre code { background: transparent; padding: 0; }
  .tx-assistant strong { color: var(--ink); }
  .tx-assistant em { color: var(--ink-dim); }
  .tx-tool {
    color: var(--ink-faint); font-size: 12px; font-style: italic;
    padding: 2px 0 2px 14px; border-left: 1px solid var(--line);
    margin: 2px 0;
  }
  .tx-thinking {
    color: var(--ink-faint); font-size: 12.5px; font-style: italic;
    padding: 6px 0; display: flex; align-items: center; gap: 8px;
  }
  .tx-thinking::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.4s ease-in-out infinite;
  }
  .tx-empty {
    color: var(--ink-faint); font-size: 12.5px; font-style: italic;
    padding: 10px 0;
  }

  /* Stand-up input box (card #1057). All stand-up keystrokes are routed
     through this textarea instead of into the embedded xterm, because
     Wispr Flow dictation duplicates almost every paste when it simulates
     keystrokes directly into the terminal. Sits beneath .standup-terminal;
     starts as a single visible row, grows up to ~5 rows on focus or when
     content wraps. Enter sends to PTY (with \r); Shift+Enter inserts a
     literal newline. */
  .standup-input { display:block; width:100%; resize:none; box-sizing:border-box;
    background:var(--panel); color:var(--ink);
    border:1px solid var(--line); border-radius:9px;
    padding:7px 11px; margin:0 0 14px;
    font-family:var(--mono); font-size:13px; line-height:1.5;
    outline:none; overflow-y:auto;
    height:36px;
    transition:height .12s ease, border-color .15s; }
  .standup-input:focus { border-color: var(--accent-dim); }
  .standup-input::placeholder { color: var(--ink-faint); }

  /* stand-up in-flight banner */
  .standup-banner { background:rgba(196,168,95,.10); border:1px solid rgba(196,168,95,.45); color:var(--t-year); border-radius:9px; padding:9px 13px; margin:0 0 14px; font-size:12.5px; display:flex; align-items:center; gap:9px; }
  .standup-banner::before { content:""; width:8px; height:8px; border-radius:50%; background:var(--t-year); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
  .standup-disabled .check, .standup-disabled .star { cursor: not-allowed; opacity: .55; }
  .standup-disabled .act-text[contenteditable="true"] { background: transparent; }
  .act-text[contenteditable="true"] { outline: none; border-radius: 3px; padding: 1px 3px; margin: -1px -3px; cursor: text; }
  .act-text[contenteditable="true"]:hover { background: rgba(255,255,255,.04); }
  .act-text[contenteditable="true"]:focus { background: var(--bg-2); box-shadow: 0 0 0 1px var(--line-2); }
  .check, .star { cursor: pointer; }

  /* today banner */
  .today { background:var(--accent-soft); border:1px solid var(--accent-dim); border-radius:10px; padding:13px 15px; margin-bottom:18px; }
  .today h4 { font-size:11px; letter-spacing:.6px; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
  .today .refl { font-size:13px; color:var(--ink); margin-bottom:9px; }
  .today ul { list-style:none; display:flex; flex-direction:column; gap:5px; }
  .today li { font-size:13px; display:flex; gap:8px; }
  .today li::before { content:"\203A"; color:var(--accent); }

  /* footer */
  .foot { display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line); margin-top:32px; padding-top:13px; }
  .saved { font-size:11px; color:var(--ink-faint); }
  .review { font-size:11px; color:var(--ink-faint); }
  .review b { color:var(--ink-dim); font-weight:500; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="cta" id="initBtn" hidden><span class="tri">&#9655;</span> Initialize Life</button>
    <button class="cta secondary" id="addBtn" disabled><span class="plus">+</span> Add</button>
    <button class="cta" id="standupBtn" disabled><span class="tri">&#9655;</span> Initiate Stand-Up</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-view="focus">Focus<span class="n" id="nFocus"></span></button>
    <button class="tab" data-view="map">Map</button>
    <button class="tab" data-view="horizons">Horizons</button>
    <button class="tab" data-view="balance">Balance</button>
    <button class="tab" data-view="inbox">Inbox<span class="n" id="nInbox"></span></button>
  </div>

  <div id="standupBanner" class="standup-banner" hidden>Stand-up in progress &mdash; inline edits paused.</div>
  <div id="addBanner" class="standup-banner" hidden>Add in progress &mdash; inline edits paused.</div>
  <div id="vizPanel" class="viz-panel" hidden><canvas id="vizCanvas"></canvas></div>
  <div id="standupTerminal" class="standup-terminal" hidden></div>
  <textarea id="standupInput" class="standup-input" hidden rows="1" spellcheck="false"
    placeholder="Type or dictate &mdash; Enter to send, Shift+Enter for newline"></textarea>
  <div id="container"></div>

  <div class="foot">
    <span class="review" id="filePath"></span>
    <span class="saved" id="saved">waiting&hellip;</span>
  </div>
</div>

<script>
/* Receives state from the .NET host via window.chrome.webview. Inline
   mutations (star, check, title) build the new whole-file plan in-place,
   then postMessage it back as {type:"mutate", plan:…}; the host atomically
   saves and re-posts on file change. While a stand-up is in flight, the
   host sets standupInFlight=true and mutations are disabled. */

const HORIZONS = { month:"This month", year:"This year", beyond:"Beyond" };
// Action-level horizon enum (matches Bishop.Life.Core.Schema.Horizon serialized
// via JsonStringEnumConverter w/ camelCase). Order is the cycle order on click.
const ACTION_HORIZONS = { today:"Today", thisWeek:"This week", thisMonth:"This month", someday:"Someday" };
const ACTION_HORIZON_KEYS = Object.keys(ACTION_HORIZONS);
const DEFAULT_ACTION_HORIZON = "thisWeek";

let plan = null;       // nested LifePlan from Bishop.Life.Core
let status = "waiting";
let filePath = "";
let currentView = "focus";
let standupInFlight = false;
let addInFlight = false;
let titleDebounce = null;
let titleDebounceTarget = null; // {id, el} of the contenteditable awaiting flush

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// Convert a #RRGGBB hex string into an rgba() with the given alpha, for
// tinting area heading backgrounds on the Map tab without baking opacity
// into the source colour. Falls back to a neutral tint if the hex is junk.
function tint(hex, alpha) {
  const h = String(hex || "").replace("#", "");
  if (h.length !== 6) return `rgba(255,255,255,${alpha})`;
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  if ([r, g, b].some(n => Number.isNaN(n))) return `rgba(255,255,255,${alpha})`;
  return `rgba(${r},${g},${b},${alpha})`;
}

function bucket(horizon) {
  if (!horizon) return "beyond";
  const parts = String(horizon).split("-");
  const y = Number(parts[0]), m = Number(parts[1]);
  if (!y || !m) return "beyond";
  const now = new Date();
  const diff = (y - now.getFullYear()) * 12 + (m - (now.getMonth() + 1));
  if (diff <= 3) return "month";
  if (y === now.getFullYear()) return "year";
  return "beyond";
}

function allGoals() {
  if (!plan) return [];
  return (plan.areas || []).flatMap(a => (a.goals || []).map(g => ({ goal: g, area: a })));
}

function allActions() {
  if (!plan) return [];
  return (plan.areas || []).flatMap(a => (a.goals || []).flatMap(g => (g.actions || []).map(act => ({ action: act, goal: g, area: a }))));
}

function setSaved(text) { document.getElementById("saved").textContent = text; }
function setFilePath(p) { document.getElementById("filePath").textContent = p || ""; }

function findAction(id) {
  if (!plan || !id) return null;
  for (const a of plan.areas || [])
    for (const g of a.goals || [])
      for (const act of g.actions || [])
        if (act.id === id) return act;
  return null;
}

function findGoal(id) {
  if (!plan || !id) return null;
  for (const a of plan.areas || [])
    for (const g of a.goals || [])
      if (g.id === id) return g;
  return null;
}

// Swap a goal chip with an inline <input type="month"> focused for edit. Commit
// on change/blur; Enter commits, Escape reverts. On a successful commit we let
// the host's envelope re-render the chip; on no-op we just re-render locally.
function openGoalHorizonEditor(pill) {
  const id = pill.dataset.goalId;
  const goal = findGoal(id); if (!goal) return;
  const current = /^\d{4}-(0[1-9]|1[0-2])$/.test(String(goal.horizon || "")) ? goal.horizon : "";
  const input = document.createElement("input");
  input.type = "month";
  input.className = "g-pill-edit";
  input.value = current;
  input.dataset.goalId = id;
  pill.replaceWith(input);
  input.focus();
  let done = false;
  const finish = (commit) => {
    if (done) return; done = true;
    if (commit) {
      if (commitGoalHorizon(id, input.value)) { render(); return; }
    }
    render();
  };
  input.addEventListener("blur", () => finish(true));
  input.addEventListener("keydown", ev => {
    if (ev.key === "Enter") { ev.preventDefault(); finish(true); }
    else if (ev.key === "Escape") { ev.preventDefault(); finish(false); }
  });
}

// Empty value clears horizon to null; otherwise must match YYYY-MM (01–12).
// Invalid input is rejected silently and the chip re-renders to its prior state.
function commitGoalHorizon(id, value) {
  const g = findGoal(id); if (!g) return false;
  const v = (value || "").trim();
  if (v === "") {
    if (g.horizon == null) return false;
    g.horizon = null;
  } else if (/^\d{4}-(0[1-9]|1[0-2])$/.test(v)) {
    if (v === g.horizon) return false;
    g.horizon = v;
  } else {
    return false;
  }
  postMutation();
  return true;
}

function postMutation() {
  if (!window.chrome || !window.chrome.webview) return;
  // Pass the object directly — JSON.stringify here would make WebView2 deliver
  // it as a JSON-encoded String (ValueKind.String on the host), which the host's
  // string branch only recognizes for the bare "standup" / "init" commands and
  // silently drops everything else. As an object it arrives as ValueKind.Object
  // and the {type:"mutate",plan} handler runs.
  window.chrome.webview.postMessage({ type: "mutate", plan });
  setSaved("saving…");
}

function flushPendingTitleEdit() {
  if (!titleDebounceTarget) return;
  clearTimeout(titleDebounce);
  const { id, el } = titleDebounceTarget;
  titleDebounce = null;
  titleDebounceTarget = null;
  commitTitle(id, el.textContent);
}

function commitTitle(id, value) {
  const a = findAction(id); if (!a) return;
  const trimmed = (value || "").replace(/\s+/g, " ").trim();
  if (!trimmed || trimmed === a.title) return;
  a.title = trimmed;
  postMutation();
}

function attr(id) { return `data-action-id="${esc(id)}"`; }

function render() {
  const focusCount = allActions().filter(x => x.action.starred && !x.action.done).length;
  document.getElementById("nFocus").textContent = focusCount || "";
  const inboxCount = (plan && plan.inbox ? plan.inbox.length : 0);
  document.getElementById("nInbox").textContent = inboxCount || "";

  const c = document.getElementById("container");
  if (status === "missing") {
    c.innerHTML = `<div class="empty" style="margin-top:24px">No bishop.life file at <b>${esc(filePath)}</b>. Click <b>Initialize Life</b> above to seed it.</div>`;
    return;
  }
  if (status === "error") {
    c.innerHTML = `<div class="empty" style="margin-top:24px;color:var(--danger)">Couldn't read <b>${esc(filePath)}</b>.</div>`;
    return;
  }
  if (!plan) {
    c.innerHTML = `<div class="empty" style="margin-top:24px">Waiting for state from host&hellip;</div>`;
    return;
  }

  const renderers = { focus: focusView, map: mapView, horizons: horizonsView, balance: balanceView, inbox: inboxView };
  c.innerHTML = renderers[currentView]();
}

function focusView() {
  let h = '<div class="view">';
  const lastStandup = (plan.standups || []).slice(-1)[0];
  if (lastStandup) {
    const focusIds = new Set(lastStandup.focusToday || []);
    const focusTitles = allActions().filter(x => focusIds.has(x.action.id)).map(x => x.action.title);
    h += `<div class="today"><h4>Today &middot; from latest stand-up</h4>
      <div class="refl">${esc(lastStandup.reflection || "")}</div>
      ${focusTitles.length ? `<ul>${focusTitles.map(t => `<li>${esc(t)}</li>`).join("")}</ul>` : ""}
    </div>`;
  }

  const starred = allActions().filter(x => x.action.starred && !x.action.done);
  h += `<div class="sect">What matters now</div><div class="sect-sub">Starred actions, each tied to the goal it serves.</div>`;
  if (!starred.length) {
    h += `<div class="empty">Nothing starred. Run a stand-up to set today's focus.</div>`;
  } else {
    h += starred.map(({ action, goal, area }) => `
      <div class="card" style="display:flex;align-items:center;gap:11px" ${attr(action.id)}>
        <div class="check ${action.done ? "on" : ""}"></div>
        <div style="flex:1">
          <div class="act-text" style="font-size:13.5px" contenteditable="true" spellcheck="false">${esc(action.title)}</div>
          <div class="lineage" style="margin-top:3px"><span class="dot" style="background:${esc(area.color)}"></span> <b>${esc(area.name)}</b> &#9656; ${esc(goal.name)}</div>
        </div>
        <span class="star on">&#9733;</span>
      </div>`).join("");
  }

  const monthGoals = allGoals().filter(x => bucket(x.goal.horizon) === "month");
  h += `<div class="sect">This month's targets</div><div class="sect-sub">Goals on the nearest horizon.</div>`;
  if (!monthGoals.length) {
    h += `<div class="empty">No goals on the month horizon.</div>`;
  } else {
    h += monthGoals.map(goalMini).join("");
  }
  return h + "</div>";
}

function goalMini({ goal, area }) {
  const acts = goal.actions || [];
  const done = acts.filter(a => a.done).length;
  return `<div class="card" style="display:flex;align-items:center;gap:10px">
    <span class="dot" style="background:${esc(area.color)}"></span>
    <div style="flex:1">
      <div style="font-weight:500;font-size:13.5px">${esc(goal.name)}</div>
      <div class="lineage" style="margin-top:2px">${esc(area.name)}</div>
    </div>
    <span class="progress">${done}/${acts.length}</span>
  </div>`;
}

function actionHorizonKey(a) {
  return ACTION_HORIZONS[a.horizon] ? a.horizon : DEFAULT_ACTION_HORIZON;
}

function goalHorizonChip(goal) {
  const h = goal.horizon;
  const isYm = /^\d{4}-(0[1-9]|1[0-2])$/.test(String(h || ""));
  const cls = isYm ? bucket(h) : (h ? "beyond" : "empty");
  const label = isYm ? esc(h) : (h ? esc(h) : "—");
  return `<span class="g-pill ${cls}" data-goal-id="${esc(goal.id)}" title="Click to set goal horizon (YYYY-MM)">${label}</span>`;
}

function mapView() {
  let h = `<div class="view"><div class="sect">The map</div><div class="sect-sub">Actions grouped by horizon within each life area. The urgency at a glance.</div>`;
  h += (plan.areas || []).map(area => {
    const goals = area.goals || [];
    const flat = goals.flatMap(g => (g.actions || []).map(a => ({ a, goal: g })));
    const openCount = flat.filter(x => !x.a.done).length;
    let block = `<div class="area-block" style="border-left-color:${esc(area.color)}">
      <div class="area-head" style="background:${esc(tint(area.color, 0.10))}">
      <span class="dot" style="background:${esc(area.color)}"></span>
      <span class="area-name">${esc(area.name)}</span>
      <span class="area-meta">${goals.length} goal${goals.length !== 1 ? "s" : ""} &middot; ${openCount} open</span>
    </div>`;

    for (const g of goals) {
      block += `<div class="goal-block">
        <div class="goal-head">
          <span class="goal-title">${esc(g.name)}</span>
          ${goalHorizonChip(g)}
        </div>
      </div>`;
    }

    // Group actions by horizon section; empty sections collapse (not rendered).
    // Within a section, starred sorts above unstarred so a starred Today action leads its bucket.
    for (const hkey of ACTION_HORIZON_KEYS) {
      const items = flat.filter(x => actionHorizonKey(x.a) === hkey);
      if (!items.length) continue;
      items.sort((x, y) => Number(!!y.a.starred) - Number(!!x.a.starred));
      block += `<div class="h-sect ${hkey}">${ACTION_HORIZONS[hkey]} &middot; ${items.length}</div>`;
      block += items.map(({ a, goal }) => {
        const hk = actionHorizonKey(a);
        return `<div class="act ${a.done ? "done" : ""}" ${attr(a.id)}>
          <div class="check ${a.done ? "on" : ""}"></div>
          <div style="flex:1">
            <span class="act-text" contenteditable="true" spellcheck="false">${esc(a.title)}</span>
            <div class="lineage" style="margin-top:2px">${esc(goal.name)}</div>
          </div>
          <span class="h-pill ${hk}" title="Click to cycle horizon">${ACTION_HORIZONS[hk]}</span>
          <span class="star ${a.starred ? "on" : ""}">${a.starred ? "&#9733;" : "&#9734;"}</span>
        </div>`;
      }).join("");
    }
    if (!flat.length) {
      block += `<div class="empty" style="padding:12px;font-size:12px">No actions in this area.</div>`;
    }
    return block + "</div>";
  }).join("");
  return h + "</div>";
}

function horizonsView() {
  let h = `<div class="view"><div class="sect">Horizons</div><div class="sect-sub">The same goals, sorted by how far out they sit.</div><div class="lanes">`;
  for (const [k, label] of Object.entries(HORIZONS)) {
    const items = allGoals().filter(x => bucket(x.goal.horizon) === k);
    h += `<div class="lane ${k}"><div class="lane-title">${label} &middot; ${items.length}</div>`;
    h += items.length
      ? items.map(({ goal, area }) => {
          const acts = goal.actions || [];
          const done = acts.filter(a => a.done).length;
          return `<div class="mini"><div class="t">${esc(goal.name)}</div>
            <div class="m"><span class="dot" style="background:${esc(area.color)}"></span>
              <span class="lineage">${esc(area.name)}</span>
              <span class="progress" style="margin-left:auto">${done}/${acts.length}</span>
            </div></div>`;
        }).join("")
      : `<div class="empty" style="padding:13px;font-size:12px">empty</div>`;
    h += "</div>";
  }
  return h + "</div></div>";
}

function balanceView() {
  const rows = (plan.areas || []).map(area => {
    const goals = area.goals || [];
    const open = goals.reduce((n, g) => n + (g.actions || []).filter(a => !a.done).length, 0);
    return { area, goalCount: goals.length, open };
  });
  const max = Math.max(1, ...rows.map(r => r.open));
  let h = `<div class="view"><div class="sect">Balance</div><div class="sect-sub">Open actions per area. Not a leaderboard &mdash; a way to notice what's gone quiet.</div>`;
  h += rows.map(r => `<div class="bal-row">
    <div class="bal-name"><span class="dot" style="background:${esc(r.area.color)}"></span>${esc(r.area.name)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${(r.open / max * 100) || 2}%;background:${esc(r.area.color)}"></div></div>
    <div class="bal-count">${r.goalCount ? `${r.goalCount}g &middot; ${r.open} open` : `<span class="untended">untended</span>`}</div>
  </div>`).join("");
  return h + "</div>";
}

function inboxView() {
  const items = (plan.inbox || []).slice().sort((a, b) => {
    const ta = new Date(a.capturedAt || 0).getTime();
    const tb = new Date(b.capturedAt || 0).getTime();
    return tb - ta;
  });
  let h = `<div class="view"><div class="sect">Inbox</div><div class="sect-sub">Captured via <code>/bish-life-add</code>. Triaged into areas during the next stand-up.</div>`;
  if (!items.length) {
    h += `<div class="empty">Inbox is empty. Capture a thought with <code>/bish-life-add</code>.</div>`;
  } else {
    h += items.map(item => `<div class="card" style="display:flex;align-items:flex-start;gap:11px">
      <div style="flex:1">
        <div class="act-text" style="font-size:13.5px">${esc(item.text)}</div>
        <div class="lineage" style="margin-top:3px">${esc(formatCapturedAt(item.capturedAt))}</div>
      </div>
    </div>`).join("");
  }
  return h + "</div>";
}

function formatCapturedAt(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso);
  return d.toLocaleString([], { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

document.querySelector(".tabs").addEventListener("click", e => {
  const tab = e.target.closest(".tab"); if (!tab) return;
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  tab.classList.add("active");
  currentView = tab.dataset.view;
  render();
});

function applyEnvelope(env) {
  status = env.status || "ok";
  filePath = env.filePath || "";
  plan = env.plan || null;
  standupInFlight = !!env.standupInFlight;
  addInFlight = !!env.addInFlight;
  const anyInFlight = standupInFlight || addInFlight;
  setFilePath(filePath);
  setSaved(status === "ok" ? "loaded · " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : status);
  // Stand-up and add both run even when no file exists yet (stand-up seeds
  // one, add appends to inbox), so enable both buttons on any envelope from
  // the host rather than gating on plan data. While either skill is in flight,
  // both CTAs are disabled to prevent overlapping launches.
  document.getElementById("standupBtn").disabled = anyInFlight;
  document.getElementById("addBtn").disabled = anyInFlight;
  document.getElementById("initBtn").hidden = status !== "missing" || anyInFlight;
  document.getElementById("standupBanner").hidden = !standupInFlight;
  document.getElementById("addBanner").hidden = !addInFlight;
  document.body.classList.toggle("standup-disabled", anyInFlight);
  // Drop any pending edit — its target node is about to be replaced by render().
  titleDebounce = null;
  titleDebounceTarget = null;
  render();
}

const container = document.getElementById("container");

container.addEventListener("click", e => {
  const gPill = e.target.closest(".g-pill[data-goal-id]");
  if (gPill) {
    if (standupInFlight || addInFlight) return;
    openGoalHorizonEditor(gPill);
    return;
  }
  const host = e.target.closest("[data-action-id]");
  if (!host) return;
  if (standupInFlight || addInFlight) return;
  const id = host.dataset.actionId;
  const action = findAction(id); if (!action) return;

  if (e.target.closest(".check")) {
    flushPendingTitleEdit();
    action.done = !action.done;
    action.completedAt = action.done ? new Date().toISOString() : null;
    postMutation();
    render();
  } else if (e.target.closest(".star")) {
    flushPendingTitleEdit();
    action.starred = !action.starred;
    postMutation();
    render();
  } else if (e.target.closest(".h-pill")) {
    flushPendingTitleEdit();
    const cur = ACTION_HORIZONS[action.horizon] ? action.horizon : DEFAULT_ACTION_HORIZON;
    const idx = ACTION_HORIZON_KEYS.indexOf(cur);
    action.horizon = ACTION_HORIZON_KEYS[(idx + 1) % ACTION_HORIZON_KEYS.length];
    postMutation();
    render();
  }
});

container.addEventListener("input", e => {
  const text = e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  const host = text.closest("[data-action-id]");
  if (!host) return;
  if (standupInFlight || addInFlight) { text.textContent = findAction(host.dataset.actionId)?.title || ""; return; }
  clearTimeout(titleDebounce);
  titleDebounceTarget = { id: host.dataset.actionId, el: text };
  titleDebounce = setTimeout(flushPendingTitleEdit, 500);
});

container.addEventListener("blur", e => {
  const text = e.target.closest && e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  flushPendingTitleEdit();
}, true);

container.addEventListener("keydown", e => {
  const text = e.target.closest && e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  if (e.key === "Enter") { e.preventDefault(); text.blur(); }
  else if (e.key === "Escape") {
    const host = text.closest("[data-action-id]");
    const action = host && findAction(host.dataset.actionId);
    if (action) { text.textContent = action.title; }
    clearTimeout(titleDebounce); titleDebounce = null; titleDebounceTarget = null;
    text.blur();
  }
});

if (window.chrome && window.chrome.webview) {
  window.chrome.webview.addEventListener("message", evt => {
    const env = typeof evt.data === "string" ? JSON.parse(evt.data) : evt.data;
    if (env && typeof env.type === "string" && env.type.startsWith("speak.")) {
      if (env.type === "speak.started") startSpeakViz(env.pcmBase64 || "", env.pcmSampleRateHz || 8000, env.durationMs || 0);
      else if (env.type === "speak.stopped") stopSpeakViz();
      return;
    }
    if (env && typeof env.type === "string" && env.type.startsWith("terminal:")) {
      if (env.type === "terminal:show") showStandupTerminal();
      else if (env.type === "terminal:hide") hideStandupTerminal();
      // terminal:data still flows from the host as a dormant fallback for the
      // legacy xterm path; the transcript:event stream is the live channel
      // (card #1059), so we no longer render raw PTY bytes here.
      return;
    }
    if (env && env.type === "transcript:event") {
      appendTranscriptEvent(env.kind, env.text || "");
      return;
    }
    applyEnvelope(env);
  });
}

/* Embedded stand-up transcript (card #1059). Replaces the xterm.js view
   (card #1053) with an HTML chat transcript rendered from the on-disk
   Claude Code session JSONL. The .NET host launches `claude --session-id
   <guid>`, tails the resulting JSONL file, and emits one
   {type:"transcript:event", kind, text} envelope per parsed line.
   Lifecycle:
     show → clear transcript, reveal pane, show input textarea, focus it
     transcript:event → append a user/assistant/tool entry
     hide → clear transcript, hide pane
   No live ConPTY rendering on this path; raw PTY bytes still flow as
   `terminal:data` envelopes but are ignored — they are kept dormant on
   the host side so a future fallback can re-render them if JSONL tailing
   ever fails. */
const standupTerminalEl = document.getElementById("standupTerminal");
let transcriptThinkingEl = null;
let lastTranscriptKind = null;

function showStandupTerminal() {
  standupTerminalEl.hidden = false;
  clearTranscript();
  showStandupInput();
}

function hideStandupTerminal() {
  standupTerminalEl.hidden = true;
  clearTranscript();
  hideStandupInput();
}

function clearTranscript() {
  standupTerminalEl.innerHTML = "";
  transcriptThinkingEl = null;
  lastTranscriptKind = null;
}

function appendTranscriptEvent(kind, text) {
  const wasAtBottom = isScrolledToBottom(standupTerminalEl);
  removeThinking();

  const entry = document.createElement("div");
  entry.className = "tx-entry";
  if (kind === "user") {
    const bubble = document.createElement("div");
    bubble.className = "tx-user";
    bubble.textContent = text;
    entry.appendChild(bubble);
    standupTerminalEl.appendChild(entry);
    showThinking();
  } else if (kind === "assistant") {
    const body = document.createElement("div");
    body.className = "tx-assistant";
    body.innerHTML = renderMarkdown(text);
    entry.appendChild(body);
    standupTerminalEl.appendChild(entry);
  } else if (kind === "tool") {
    const line = document.createElement("div");
    line.className = "tx-tool";
    line.textContent = text;
    entry.appendChild(line);
    standupTerminalEl.appendChild(entry);
    // Tool calls happen during the agent turn — keep showing the thinking
    // indicator until the next assistant text lands.
    showThinking();
  } else {
    return;
  }
  lastTranscriptKind = kind;
  if (wasAtBottom) scrollToBottom(standupTerminalEl);
}

function showThinking() {
  if (transcriptThinkingEl) return;
  const el = document.createElement("div");
  el.className = "tx-thinking";
  el.textContent = "Bishop is thinking…";
  standupTerminalEl.appendChild(el);
  transcriptThinkingEl = el;
}

function removeThinking() {
  if (transcriptThinkingEl) {
    transcriptThinkingEl.remove();
    transcriptThinkingEl = null;
  }
}

function isScrolledToBottom(el) {
  return el.scrollHeight - el.scrollTop - el.clientHeight < 24;
}

function scrollToBottom(el) {
  el.scrollTop = el.scrollHeight;
}

/* Minimal markdown → HTML. Covers paragraphs, ATX headings (#–###),
   fenced code blocks, inline code, **bold**, *italic*, bullet/numbered
   lists, and [text](url) links. All output passes through escapeHtml
   first so user content can't inject markup. Deliberately tiny — claude
   prose in stand-ups is short and doesn't need a full CommonMark engine. */
function renderMarkdown(src) {
  if (!src) return "";
  // Pull out fenced code blocks first so their contents bypass inline rules.
  const codeStash = [];
  let s = String(src).replace(/```([a-z0-9_+-]*)\n([\s\S]*?)```/gi, (_, lang, body) => {
    const i = codeStash.length;
    codeStash.push(`<pre><code>${escapeHtml(body.replace(/\n$/, ""))}</code></pre>`);
    return `␀CODE${i}␀`;
  });
  s = escapeHtml(s);
  // Inline code (`x`).
  s = s.replace(/`([^`\n]+)`/g, (_, c) => `<code>${c}</code>`);
  // Bold + italic. Bold first so **x** inside *x* doesn't double-wrap.
  s = s.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  // Links.
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Block transform line-by-line.
  const lines = s.split("\n");
  const out = [];
  let listKind = null; // "ul" | "ol" | null
  let para = [];
  const flushPara = () => {
    if (para.length) { out.push(`<p>${para.join(" ")}</p>`); para = []; }
  };
  const closeList = () => { if (listKind) { out.push(`</${listKind}>`); listKind = null; } };
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { flushPara(); closeList(); continue; }
    const heading = line.match(/^(#{1,3})\s+(.+)$/);
    if (heading) { flushPara(); closeList(); out.push(`<h${heading[1].length}>${heading[2]}</h${heading[1].length}>`); continue; }
    const bullet = line.match(/^[-*]\s+(.+)$/);
    if (bullet) {
      flushPara();
      if (listKind !== "ul") { closeList(); out.push("<ul>"); listKind = "ul"; }
      out.push(`<li>${bullet[1]}</li>`);
      continue;
    }
    const numbered = line.match(/^\d+\.\s+(.+)$/);
    if (numbered) {
      flushPara();
      if (listKind !== "ol") { closeList(); out.push("<ol>"); listKind = "ol"; }
      out.push(`<li>${numbered[1]}</li>`);
      continue;
    }
    closeList();
    para.push(line);
  }
  flushPara();
  closeList();

  // Restore code blocks.
  return out.join("").replace(/␀CODE(\d+)␀/g, (_, i) => codeStash[Number(i)]);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* Stand-up input box (card #1057). Routes keystrokes/dictation to the PTY
   through a dedicated textarea so Wispr Flow's keystroke simulation lands
   in a normal input element (no duplication) rather than xterm's helper
   textarea. Single visible row until focused, grows up to 5 rows on focus
   or when content wraps. */
const standupInputEl = document.getElementById("standupInput");
const STANDUP_INPUT_BASE_PX = 36;   // one visible row + border + padding
const STANDUP_INPUT_MAX_PX = 116;   // ~5 rows of 13px @ line-height 1.5 + chrome

function showStandupInput() {
  standupInputEl.hidden = false;
  standupInputEl.value = "";
  resizeStandupInput();
  standupInputEl.focus();
}

function hideStandupInput() {
  standupInputEl.hidden = true;
  standupInputEl.value = "";
  standupInputEl.style.height = STANDUP_INPUT_BASE_PX + "px";
}

function resizeStandupInput() {
  const focused = document.activeElement === standupInputEl;
  if (!focused && !standupInputEl.value) {
    standupInputEl.style.height = STANDUP_INPUT_BASE_PX + "px";
    return;
  }
  // Measure natural content height, then clamp into [base, max].
  standupInputEl.style.height = "auto";
  const natural = standupInputEl.scrollHeight;
  const target = focused
    ? Math.max(natural, STANDUP_INPUT_MAX_PX)
    : Math.min(natural, STANDUP_INPUT_MAX_PX);
  standupInputEl.style.height = Math.min(target, STANDUP_INPUT_MAX_PX) + "px";
}

standupInputEl.addEventListener("focus", resizeStandupInput);
standupInputEl.addEventListener("blur", resizeStandupInput);
standupInputEl.addEventListener("input", resizeStandupInput);
standupInputEl.addEventListener("keydown", ev => {
  if (ev.key !== "Enter" || ev.shiftKey) return; // Shift+Enter inserts a newline
  ev.preventDefault();
  const text = standupInputEl.value;
  if (!text) return;
  if (window.chrome && window.chrome.webview) {
    // Trailing \r matches what xterm's onData would emit for Enter, which is
    // what the claude TUI expects to commit a prompt.
    window.chrome.webview.postMessage({ type: "terminal:input", data: text + "\r" });
  }
  standupInputEl.value = "";
  resizeStandupInput();
});

/* Speak viz — receives raw 8 kHz mono int16 PCM (base64) from Bishop.Cli
   over the bishop-life-speak pipe (forwarded by LifePlanHost). Renders a
   centred oscilloscope trace: the centre column maps to the 150 ms
   look-ahead boundary and the edges map to the current playback time,
   so peaks emerge at centre and slide outward as playback advances.
   The left half is drawn as the horizontal mirror of the right so the
   trace stays symmetric about the vertical centre.
   PCM sign drives vertical deflection. CRT-phosphor styling: persistence
   trail (per-frame translucent clear instead of clearRect) plus an
   additive glow underlay on the accent stroke. No playhead — the trace
   itself is the cue. The panel is revealed on the first utterance and
   stays visible thereafter; between chunks it shows a flat accent line. */
const vizPanel = document.getElementById("vizPanel");
const vizCanvas = document.getElementById("vizCanvas");
let vizSession = null;
const VIZ_WINDOW_MS = 300; // total window — 150 ms each side of "now"

function startSpeakViz(pcmBase64, pcmSampleRateHz, durationMs) {
  cancelSpeakViz();
  vizPanel.hidden = false;
  vizSession = {
    pcm: decodePcmBase64(pcmBase64 || ""),
    sampleRateHz: pcmSampleRateHz || 8000,
    durationMs: durationMs || 0,
    startedAt: performance.now(),
    raf: 0,
    decayStartedAt: 0,
  };
  resizeSpeakViz();
  // Wipe any leftover trail from the previous utterance so the new trace
  // doesn't ghost atop stale phosphor.
  const ctx = vizCanvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, vizCanvas.clientWidth, vizCanvas.clientHeight);
  drawSpeakViz();
}

function stopSpeakViz() {
  cancelSpeakViz();
  drawFlatLine();
}

function cancelSpeakViz() {
  if (vizSession && vizSession.raf) cancelAnimationFrame(vizSession.raf);
  vizSession = null;
}

// Decode base64 → Int16Array (little-endian). Returns an empty array when
// the input is empty or malformed so the rest of the viz can stay branchless.
function decodePcmBase64(b64) {
  if (!b64) return new Int16Array(0);
  try {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    // Copy into a fresh buffer so the Int16 view is guaranteed aligned.
    const buf = new ArrayBuffer(bytes.length);
    new Uint8Array(buf).set(bytes);
    return new Int16Array(buf);
  } catch (_) {
    return new Int16Array(0);
  }
}

function resizeSpeakViz() {
  const dpr = window.devicePixelRatio || 1;
  const w = vizCanvas.clientWidth;
  const h = vizCanvas.clientHeight;
  vizCanvas.width = Math.max(1, Math.round(w * dpr));
  vizCanvas.height = Math.max(1, Math.round(h * dpr));
}

function accentColor() {
  return getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#00FF41";
}

// Parse `--accent` to {r,g,b} so we can build phosphor-trail rgba() strings
// without baking the hex into the JS.
function accentRgb() {
  const hex = accentColor().replace("#", "");
  if (hex.length !== 6) return { r: 0, g: 255, b: 65 };
  return {
    r: parseInt(hex.slice(0, 2), 16),
    g: parseInt(hex.slice(2, 4), 16),
    b: parseInt(hex.slice(4, 6), 16),
  };
}

function drawFlatLine() {
  if (vizPanel.hidden) return;
  resizeSpeakViz();
  const ctx = vizCanvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = vizCanvas.clientWidth;
  const h = vizCanvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = accentColor();
  const y = Math.round(h / 2) - 1;
  ctx.fillRect(0, y, w, 2);
}

function drawSpeakViz() {
  if (!vizSession) return;
  const ctx = vizCanvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = vizCanvas.clientWidth;
  const h = vizCanvas.clientHeight;
  const mid = h / 2;

  // CRT phosphor persistence: translucent clear (~100 ms full fade at 60 fps)
  // via destination-out so the previous frame ghosts under the new trace.
  // Using destination-out instead of an rgba fill keeps the effect theme-
  // agnostic — pixels fade to fully transparent rather than to black.
  ctx.globalCompositeOperation = "destination-out";
  ctx.fillStyle = "rgba(0,0,0,0.18)";
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = "source-over";

  const pcm = vizSession.pcm;
  const n = pcm.length;
  const rate = vizSession.sampleRateHz;
  const totalMs = vizSession.durationMs > 0
    ? vizSession.durationMs
    : (rate > 0 ? (n / rate) * 1000 : 0);
  const elapsedMs = performance.now() - vizSession.startedAt;
  const nowMs = Math.min(elapsedMs, totalMs > 0 ? totalMs : elapsedMs);

  // Map the right half of the panel to the next 150 ms of waveform, with
  // the centre column = look-ahead boundary (nowMs + 150 ms) and the right
  // edge = current playback time; mirror horizontally to the left half so
  // peaks emerge at centre and flow outward. PCM sign → vertical deflection.
  const halfMs = VIZ_WINDOW_MS / 2;
  const halfW = w / 2;

  // End-of-utterance ramp: linearly fade to silence over the final 100 ms
  // of the utterance so the trace doesn't snap to flat when audio ends.
  const remainingMs = totalMs > 0 ? totalMs - nowMs : Infinity;
  const eouGain = Math.max(0, Math.min(1, remainingMs / 100));

  const accent = accentColor();
  const { r, g, b } = accentRgb();

  if (n > 0 && rate > 0) {
    // First pass: additive glow underlay (wider, semi-transparent).
    ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = `rgba(${r},${g},${b},0.35)`;
    ctx.lineWidth = 3;
    drawTracePath(ctx, pcm, rate, nowMs, halfMs, halfW, mid, h, eouGain);

    // Second pass: sharp accent stroke on top.
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.25;
    drawTracePath(ctx, pcm, rate, nowMs, halfMs, halfW, mid, h, eouGain);
  } else {
    // No waveform — keep the flat accent line so the panel never goes black.
    ctx.fillStyle = accent;
    const y = Math.round(mid) - 1;
    ctx.fillRect(0, y, w, 2);
  }

  // Continue while playback is live, then for ~150 ms after so the trail
  // visibly decays back to flat before we stop the loop.
  if (elapsedMs < (totalMs > 0 ? totalMs : 0) + 200) {
    vizSession.raf = requestAnimationFrame(drawSpeakViz);
  } else {
    cancelSpeakViz();
    drawFlatLine();
  }
}

// Build the right half as a polyline (one Y per column), then stroke it
// twice — once normally on the right, once mirrored across the vertical
// centre to the left — so the trace is symmetric about the centre line.
// Column index i = 0 (centre) maps to the 150 ms look-ahead sample; i =
// cols (right edge) maps to "now". Peaks therefore appear at centre and
// slide outward toward the edges as playback advances.
function drawTracePath(ctx, pcm, rate, nowMs, halfMs, halfW, mid, h, eouGain) {
  const sampleAt = ms => {
    if (ms < 0) return 0;
    const idx = Math.floor((ms / 1000) * rate);
    if (idx < 0 || idx >= pcm.length) return 0;
    return pcm[idx] / 32768; // → -1..1
  };

  const amp = h * 0.45;
  const cols = Math.max(2, Math.floor(halfW));
  const ys = new Float32Array(cols + 1);
  for (let i = 0; i <= cols; i++) {
    const t = i / cols; // 0 at centre, 1 at right edge
    // Hann window: 1 at centre (t=0), 0 at edge (t=1). Peaks concentrate
    // at the centre and decay smoothly to zero at the L/R canvas edges.
    const fade = 0.5 * (1 + Math.cos(Math.PI * t));
    const v = sampleAt(nowMs + (1 - t) * halfMs) * fade * eouGain;
    ys[i] = mid - v * amp;
  }

  // Right half: centre → right edge.
  ctx.beginPath();
  ctx.moveTo(halfW, ys[0]);
  for (let i = 1; i <= cols; i++) ctx.lineTo(halfW + i, ys[i]);
  ctx.stroke();

  // Left half: horizontal mirror of the right.
  ctx.beginPath();
  ctx.moveTo(halfW, ys[0]);
  for (let i = 1; i <= cols; i++) ctx.lineTo(halfW - i, ys[i]);
  ctx.stroke();
}

window.addEventListener("resize", () => {
  if (vizSession) resizeSpeakViz();
  else if (!vizPanel.hidden) drawFlatLine();
});

document.getElementById("standupBtn").addEventListener("click", () => {
  if (standupInFlight || addInFlight) return;
  flushPendingTitleEdit();
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage("standup");
  }
});

document.getElementById("addBtn").addEventListener("click", () => {
  if (standupInFlight || addInFlight) return;
  flushPendingTitleEdit();
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage("add");
  }
});

document.getElementById("initBtn").addEventListener("click", () => {
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage("init");
  }
});

render();
</script>
</body>
</html>
