<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="cta" id="initBtn" hidden><span class="tri">&#9655;</span> Initialize Life</button>
    <button class="cta secondary" id="addBtn" disabled><span class="plus">+</span> Add</button>
    <button class="cta" id="standupBtn" disabled><span class="tri">&#9655;</span> Initiate Stand-Up</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-view="focus">Focus<span class="n" id="nFocus"></span></button>
    <button class="tab" data-view="map">Map</button>
    <button class="tab" data-view="horizons">Horizons</button>
    <button class="tab" data-view="balance">Balance</button>
    <button class="tab" data-view="inbox">Inbox<span class="n" id="nInbox"></span></button>
  </div>

  <div id="standupBanner" class="standup-banner" hidden>Stand-up in progress &mdash; inline edits paused.</div>
  <div id="addBanner" class="standup-banner" hidden>Add in progress &mdash; inline edits paused.</div>
  <div id="vizPanel" class="viz-panel" hidden><canvas id="vizCanvas"></canvas></div>
  <div id="standupTerminal" class="standup-terminal" hidden></div>
  <textarea id="standupInput" class="standup-input" hidden rows="1" spellcheck="false"
    placeholder="Type or dictate &mdash; Enter to send, Shift+Enter for newline"></textarea>
  <div id="container"></div>

  <div class="foot">
    <span class="review" id="filePath"></span>
    <span class="saved" id="saved">waiting&hellip;</span>
  </div>
</div>

<!-- SPA bootstrap compiled from js/main.ts by tsc (see Bishop.Life.App.csproj). -->
<script type="module" src="./js-build/main.js"></script>
</body>
</html>
