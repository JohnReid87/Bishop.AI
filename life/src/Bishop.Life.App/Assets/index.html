<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="cta" id="initBtn" hidden><span class="tri">&#9655;</span> Initialize Life</button>
    <button class="cta secondary" id="addBtn" disabled><span class="plus">+</span> Add</button>
    <button class="cta" id="standupBtn" disabled><span class="tri">&#9655;</span> Initiate Stand-Up</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-view="focus">Focus<span class="n" id="nFocus"></span></button>
    <button class="tab" data-view="map">Map</button>
    <button class="tab" data-view="horizons">Horizons</button>
    <button class="tab" data-view="balance">Balance</button>
    <button class="tab" data-view="inbox">Inbox<span class="n" id="nInbox"></span></button>
  </div>

  <div id="standupBanner" class="standup-banner" hidden>Stand-up in progress &mdash; inline edits paused.</div>
  <div id="addBanner" class="standup-banner" hidden>Add in progress &mdash; inline edits paused.</div>
  <div id="vizPanel" class="viz-panel" hidden><canvas id="vizCanvas"></canvas></div>
  <div id="standupTerminal" class="standup-terminal" hidden></div>
  <textarea id="standupInput" class="standup-input" hidden rows="1" spellcheck="false"
    placeholder="Type or dictate &mdash; Enter to send, Shift+Enter for newline"></textarea>
  <div id="container"></div>

  <div class="foot">
    <span class="review" id="filePath"></span>
    <span class="saved" id="saved">waiting&hellip;</span>
  </div>
</div>

<script type="module">
/* SPA bootstrap. Receives whole-file envelopes from the .NET host via the
   message-bus module, dispatches inbound events to apply-envelope and the
   stand-up module, and routes container events to inline mutators that
   post {type:"mutate", plan:…} back to the host.

   Per-tab render functions live in ./js/tabs/, the oscilloscope viz in
   ./js/speak-viz.js, and stand-up modal/transcript orchestration in
   ./js/standup.js. This file only owns global state wiring, the title /
   goal-horizon inline editors, container event delegation, and tab
   switching. */

import { state, ACTION_HORIZONS, ACTION_HORIZON_KEYS, DEFAULT_ACTION_HORIZON, allActions, findAction } from "./js/plan-state.js";
import { postToHost } from "./js/message-bus.js";
import { installDispatcher } from "./js/dispatcher.js";
import { initStandup } from "./js/standup.js";
import { initSpeakViz, startSpeakViz, stopSpeakViz, revealResting, hideSpeakViz } from "./js/speak-viz.js";
import { focusView } from "./js/tabs/focus.js";
import { mapView } from "./js/tabs/map.js";
import { horizonsView } from "./js/tabs/horizons.js";
import { balanceView } from "./js/tabs/balance.js";
import { inboxView } from "./js/tabs/inbox.js";
import { openGoalHorizonEditor } from "./js/goal-horizon-editor.js";
import { esc } from "./js/dom-utils.js";

let titleDebounce = null;
let titleDebounceTarget = null; // {id, el} of the contenteditable awaiting flush

function setSaved(text) { document.getElementById("saved").textContent = text; }
function setFilePath(p) { document.getElementById("filePath").textContent = p || ""; }

function postMutation() {
  // Pass the object directly — JSON.stringify on our side would make WebView2
  // deliver it as a JSON-encoded String (ValueKind.String on the host), which
  // the host's string branch only recognizes for the bare "standup"/"init"
  // commands and silently drops everything else. As an object it arrives as
  // ValueKind.Object and the {type:"mutate",plan} handler runs.
  postToHost({ type: "mutate", plan: state.plan });
  setSaved("saving…");
}

function flushPendingTitleEdit() {
  if (!titleDebounceTarget) return;
  clearTimeout(titleDebounce);
  const { id, el } = titleDebounceTarget;
  titleDebounce = null;
  titleDebounceTarget = null;
  commitTitle(id, el.textContent);
}

function commitTitle(id, value) {
  const a = findAction(id); if (!a) return;
  const trimmed = (value || "").replace(/\s+/g, " ").trim();
  if (!trimmed || trimmed === a.title) return;
  a.title = trimmed;
  postMutation();
}

function render() {
  document.getElementById("nFocus").textContent = allActions().filter(x => x.action.starred && !x.action.done).length || "";
  document.getElementById("nInbox").textContent = (state.plan && state.plan.inbox ? state.plan.inbox.length : 0) || "";

  const c = document.getElementById("container");
  if (state.status === "missing") {
    c.innerHTML = `<div class="empty" style="margin-top:24px">No bishop.life file at <b>${esc(state.filePath)}</b>. Click <b>Initialize Life</b> above to seed it.</div>`;
    return;
  }
  if (state.status === "error") {
    c.innerHTML = `<div class="empty" style="margin-top:24px;color:var(--danger)">Couldn't read <b>${esc(state.filePath)}</b>.</div>`;
    return;
  }
  if (!state.plan) {
    c.innerHTML = `<div class="empty" style="margin-top:24px">Waiting for state from host&hellip;</div>`;
    return;
  }

  const renderers = { focus: focusView, map: mapView, horizons: horizonsView, balance: balanceView, inbox: inboxView };
  c.innerHTML = renderers[state.currentView]();
}

document.querySelector(".tabs").addEventListener("click", e => {
  const tab = e.target.closest(".tab"); if (!tab) return;
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  tab.classList.add("active");
  state.currentView = tab.dataset.view;
  render();
});

function applyEnvelope(env) {
  state.status = env.status || "ok";
  state.filePath = env.filePath || "";
  state.plan = env.plan || null;
  state.standupInFlight = !!env.standupInFlight;
  state.addInFlight = !!env.addInFlight;
  const anyInFlight = state.standupInFlight || state.addInFlight;
  setFilePath(state.filePath);
  setSaved(state.status === "ok" ? "loaded · " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : state.status);
  // Stand-up and add both run even when no file exists yet (stand-up seeds
  // one, add appends to inbox), so enable both buttons on any envelope from
  // the host rather than gating on plan data. While either skill is in flight,
  // both CTAs are disabled to prevent overlapping launches.
  document.getElementById("standupBtn").disabled = anyInFlight;
  document.getElementById("addBtn").disabled = anyInFlight;
  document.getElementById("initBtn").hidden = state.status !== "missing" || anyInFlight;
  document.getElementById("standupBanner").hidden = !state.standupInFlight;
  document.getElementById("addBanner").hidden = !state.addInFlight;
  document.body.classList.toggle("standup-disabled", anyInFlight);
  // Drop any pending edit — its target node is about to be replaced by render().
  titleDebounce = null;
  titleDebounceTarget = null;
  render();
}

const container = document.getElementById("container");

container.addEventListener("click", e => {
  const gPill = e.target.closest(".g-pill[data-goal-id]");
  if (gPill) {
    if (state.standupInFlight || state.addInFlight) return;
    openGoalHorizonEditor(gPill, { render, postMutation });
    return;
  }
  const host = e.target.closest("[data-action-id]");
  if (!host) return;
  if (state.standupInFlight || state.addInFlight) return;
  const id = host.dataset.actionId;
  const action = findAction(id); if (!action) return;

  if (e.target.closest(".check")) {
    flushPendingTitleEdit();
    action.done = !action.done;
    action.completedAt = action.done ? new Date().toISOString() : null;
    postMutation();
    render();
  } else if (e.target.closest(".star")) {
    flushPendingTitleEdit();
    action.starred = !action.starred;
    postMutation();
    render();
  } else if (e.target.closest(".h-pill")) {
    flushPendingTitleEdit();
    const cur = ACTION_HORIZONS[action.horizon] ? action.horizon : DEFAULT_ACTION_HORIZON;
    const idx = ACTION_HORIZON_KEYS.indexOf(cur);
    action.horizon = ACTION_HORIZON_KEYS[(idx + 1) % ACTION_HORIZON_KEYS.length];
    postMutation();
    render();
  }
});

container.addEventListener("input", e => {
  const text = e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  const host = text.closest("[data-action-id]");
  if (!host) return;
  if (state.standupInFlight || state.addInFlight) { text.textContent = findAction(host.dataset.actionId)?.title || ""; return; }
  clearTimeout(titleDebounce);
  titleDebounceTarget = { id: host.dataset.actionId, el: text };
  titleDebounce = setTimeout(flushPendingTitleEdit, 500);
});

container.addEventListener("blur", e => {
  const text = e.target.closest && e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  flushPendingTitleEdit();
}, true);

container.addEventListener("keydown", e => {
  const text = e.target.closest && e.target.closest(".act-text[contenteditable='true']");
  if (!text) return;
  if (e.key === "Enter") { e.preventDefault(); text.blur(); }
  else if (e.key === "Escape") {
    const host = text.closest("[data-action-id]");
    const action = host && findAction(host.dataset.actionId);
    if (action) { text.textContent = action.title; }
    clearTimeout(titleDebounce); titleDebounce = null; titleDebounceTarget = null;
    text.blur();
  }
});

initSpeakViz(document.getElementById("vizPanel"), document.getElementById("vizCanvas"));

// Stand-up owns viz panel visibility but delegates the actual draw call back
// here via callbacks so all canvas work stays inside speak-viz.
initStandup({
  onVizReveal: () => revealResting(),
  onVizHide: () => hideSpeakViz(),
});

installDispatcher({
  applyEnvelope,
  onSpeakStarted: startSpeakViz,
  onSpeakStopped: stopSpeakViz,
});

document.getElementById("standupBtn").addEventListener("click", () => {
  if (state.standupInFlight || state.addInFlight) return;
  flushPendingTitleEdit();
  postToHost("standup");
});

document.getElementById("addBtn").addEventListener("click", () => {
  if (state.standupInFlight || state.addInFlight) return;
  flushPendingTitleEdit();
  postToHost("add");
});

document.getElementById("initBtn").addEventListener("click", () => {
  postToHost("init");
});

render();
</script>
</body>
</html>
